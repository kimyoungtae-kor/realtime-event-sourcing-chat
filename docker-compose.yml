services:
  mysql:
    image: mysql:8.4
    container_name: realtime-event-sourcing-chat-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_for_local_only}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat_event_sourcing}
      MYSQL_USER: ${MYSQL_USER:-chat_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chat_app_password}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
