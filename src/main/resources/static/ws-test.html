<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>통합 수동 검증</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f6f7f9;
			--panel: #ffffff;
			--line: #d8dee8;
			--text: #1f2937;
			--muted: #667085;
			--accent: #0f766e;
			--danger: #b42318;
			--ok: #067647;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
			font-size: 14px;
			letter-spacing: 0;
		}

		main {
			width: min(1120px, calc(100vw - 32px));
			margin: 24px auto;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 24px;
			line-height: 1.25;
		}

		p {
			margin: 0;
			color: var(--muted);
			line-height: 1.5;
		}

		.layout {
			display: grid;
			grid-template-columns: 360px 1fr;
			gap: 16px;
			margin-top: 20px;
			align-items: start;
		}

		section {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 8px;
			padding: 16px;
		}

		section + section {
			margin-top: 16px;
		}

		h2 {
			margin: 0 0 12px;
			font-size: 16px;
			line-height: 1.35;
		}

		label {
			display: grid;
			gap: 6px;
			margin-bottom: 12px;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		input,
		textarea {
			width: 100%;
			border: 1px solid var(--line);
			border-radius: 6px;
			padding: 10px;
			color: var(--text);
			background: #fff;
			font: inherit;
		}

		textarea {
			min-height: 92px;
			resize: vertical;
		}

		.actions {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
			margin-top: 8px;
		}

		button {
			min-height: 38px;
			border: 1px solid var(--line);
			border-radius: 6px;
			padding: 8px 10px;
			background: #fff;
			color: var(--text);
			font: inherit;
			cursor: pointer;
		}

		button.primary {
			border-color: var(--accent);
			background: var(--accent);
			color: #fff;
		}

		button.warn {
			border-color: var(--danger);
			color: var(--danger);
		}

		button:disabled {
			cursor: not-allowed;
			opacity: 0.5;
		}

		.status-row {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			margin-top: 12px;
		}

		.badge {
			display: inline-flex;
			align-items: center;
			min-height: 28px;
			border-radius: 999px;
			padding: 4px 10px;
			background: #eef2f6;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		.badge.ok {
			background: #ecfdf3;
			color: var(--ok);
		}

		.badge.fail {
			background: #fef3f2;
			color: var(--danger);
		}

		.log {
			height: 560px;
			overflow: auto;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: #0b1020;
			color: #e6edf7;
			padding: 12px;
			font-family: Consolas, "Courier New", monospace;
			font-size: 12px;
			line-height: 1.5;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.log-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 12px;
		}

		.log-actions {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.log-actions button {
			min-height: 32px;
			padding: 6px 9px;
			font-size: 12px;
		}

		.log-line + .log-line {
			margin-top: 8px;
		}

		.log-line .time {
			color: #98a2b3;
		}

		.log-line.send {
			color: #bae6fd;
		}

		.log-line.recv {
			color: #bbf7d0;
		}

		.log-line.error {
			color: #fecaca;
		}

		@media (max-width: 820px) {
			main {
				width: min(100vw - 20px, 720px);
				margin: 16px auto;
			}

			.layout {
				grid-template-columns: 1fr;
			}

			.log {
				height: 420px;
			}
		}
	</style>
</head>
<body>
<main>
	<h1>통합 수동 검증</h1>
	<p>Postman 없이 세션, 실시간 통신, 메시지 중복 처리, 이벤트 조회, 스냅샷 복원을 한 화면에서 확인한다.</p>

	<div class="layout">
		<div>
			<section>
				<h2>세션</h2>
				<label>
					API 기본 URL
					<input id="baseUrl" value="http://localhost:8080">
				</label>
				<label>
					세션 ID
					<input id="sessionId" placeholder="POST /sessions 응답값">
				</label>
				<label>
					사용자 ID
					<input id="senderId" value="user-ws">
				</label>
				<label>
					표시 이름
					<input id="displayName" value="검증 사용자">
				</label>
				<div class="actions">
					<button type="button" id="createSession">세션 생성</button>
					<button type="button" id="joinSession">입장</button>
					<button type="button" id="leaveSession">퇴장</button>
					<button type="button" id="endSession">세션 종료</button>
					<button type="button" id="sendAfterEnd" class="warn">종료 후 메시지 거절 자동 확인</button>
				</div>
				<p>퇴장은 참여자 상태만 LEFT로 바꾸고, 세션 종료는 세션을 COMPLETED로 닫아 이후 이벤트를 거절한다.</p>
			</section>

			<section>
				<h2>실시간 연결</h2>
				<label>
					실시간 연결 URL(WebSocket)
					<input id="wsUrl" value="ws://localhost:8080/ws">
				</label>
				<div class="actions">
					<button type="button" id="connect" class="primary">연결</button>
					<button type="button" id="disconnect">연결 해제</button>
					<button type="button" id="subscribe">구독</button>
					<button type="button" id="clearLog">로그 지우기</button>
				</div>
				<div class="status-row">
					<span id="socketState" class="badge">연결 안 됨</span>
					<span id="subscriptionState" class="badge">구독 안 됨</span>
				</div>
			</section>

			<section>
				<h2>메시지 전송</h2>
				<label>
					메시지 ID
					<input id="messageId" value="ws-msg-001">
				</label>
				<label>
					중복 방지 ID(clientEventId)
					<input id="messageClientEventId" value="ws-message-001">
				</label>
				<label>
					내용
					<textarea id="messageContent">안녕</textarea>
				</label>
				<div class="actions">
					<button type="button" id="sendRestMessage" class="primary">REST로 새 메시지 전송</button>
					<button type="button" id="sendRestDuplicate">REST 직전 메시지 재전송</button>
					<button type="button" id="sendMessage">WebSocket으로 새 메시지 전송</button>
					<button type="button" id="sendDuplicate">WebSocket 직전 메시지 재전송</button>
				</div>
			</section>

			<section>
				<h2>이벤트 조회와 상태 복원</h2>
				<label>
					이 시퀀스 이후만 조회(afterSequence)
					<input id="afterSequence" value="2">
				</label>
				<label>
					복원 기준 시점
					<input id="timelineAt" value="2026-12-31T23:59:59+09:00">
				</label>
				<label>
					복원할 최근 메시지 수
					<input id="messageLimit" value="100">
				</label>
				<div class="actions">
					<button type="button" id="listEvents">전체 이벤트 조회</button>
					<button type="button" id="listEventsAfter">지정 시퀀스 이후 조회</button>
					<button type="button" id="createSnapshot" class="primary">스냅샷 생성/재호출</button>
					<button type="button" id="restoreTimeline">타임라인 상태 복원</button>
				</div>
			</section>

			<section>
				<h2>접속 상태</h2>
				<div class="actions">
					<button type="button" id="sendDisconnected">끊김 처리</button>
					<button type="button" id="sendReconnected">재연결 처리</button>
				</div>
			</section>

		</div>

		<section>
			<div class="log-header">
				<h2>검증 로그</h2>
				<div class="log-actions">
					<button type="button" id="scrollTop">맨 위</button>
					<button type="button" id="scrollLatest">최신 로그</button>
				</div>
			</div>
			<div id="log" class="log" aria-live="polite"></div>
		</section>
	</div>
</main>

<script>
	const state = {
		socket: null,
		connected: false,
		subscribed: false,
		subscriptionIds: [],
		joinCounter: 1,
		messageCounter: 1,
		lastRestMessagePayload: null,
		lastWsMessagePayload: null,
	};

	const $ = (id) => document.getElementById(id);

	const defaultHttpOrigin = window.location.origin && window.location.protocol.startsWith("http")
		? window.location.origin
		: "http://localhost:8080";
	const defaultWsOrigin = window.location.host
		? `${window.location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}/ws`
		: "ws://localhost:8080/ws";
	$("baseUrl").value = defaultHttpOrigin;
	$("wsUrl").value = defaultWsOrigin;

	function now() {
		return new Date().toLocaleTimeString("ko-KR", { hour12: false });
	}

	function log(type, title, data) {
		const line = document.createElement("div");
		line.className = `log-line ${type}`;
		const body = typeof data === "undefined" ? "" : `\n${typeof data === "string" ? data : JSON.stringify(data, null, 2)}`;
		line.textContent = `[${now()}] ${title}${body}`;
		$("log").appendChild(line);
		scrollToLatestLog();
	}

	function scrollToLatestLog() {
		$("log").scrollTo({ top: $("log").scrollHeight, behavior: "smooth" });
		$("log").focus({ preventScroll: true });
	}

	function scrollToPageTop() {
		window.scrollTo({ top: 0, behavior: "smooth" });
	}

	function baseUrl() {
		return $("baseUrl").value.trim().replace(/\/$/, "");
	}

	function sessionId() {
		const value = $("sessionId").value.trim();
		if (!value) {
			log("error", "세션 ID가 필요합니다");
			return null;
		}
		return value;
	}

	async function readBody(response) {
		const text = await response.text();
		if (!text) {
			return null;
		}
		try {
			return JSON.parse(text);
		}
		catch (error) {
			return text;
		}
	}

	async function requestJson(method, path, body, title) {
		const options = { method, headers: { "Content-Type": "application/json" } };
		if (typeof body !== "undefined" && body !== null) {
			options.body = JSON.stringify(body);
		}
		const response = await fetch(`${baseUrl()}${path}`, options);
		const responseBody = await readBody(response);
		log(response.ok ? "recv" : "error", `${method} ${path} -> ${response.status} ${title || ""}`.trim(), responseBody);
		scrollToPageTop();
		return { response, body: responseBody };
	}

	function setSocketState(label, kind) {
		$("socketState").textContent = label;
		$("socketState").className = `badge ${kind || ""}`.trim();
	}

	function setSubscriptionState(label, kind) {
		$("subscriptionState").textContent = label;
		$("subscriptionState").className = `badge ${kind || ""}`.trim();
	}

	function stompFrame(command, headers, body) {
		const headerLines = Object.entries(headers || {}).map(([key, value]) => `${key}:${value}`);
		return `${command}\n${headerLines.join("\n")}\n\n${body || ""}\0`;
	}

	function sendFrame(command, headers, body, title) {
		if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
			log("error", "실시간 연결이 열려 있지 않습니다");
			return;
		}
		state.socket.send(stompFrame(command, headers, body));
		log("send", title || `${stompCommandLabel(command)} 전송`, { headers, body: body ? JSON.parse(body) : null });
		scrollToPageTop();
	}

	function stompCommandLabel(command) {
		const labels = {
			CONNECT: "실시간 연결 요청",
			SUBSCRIBE: "구독 요청",
			UNSUBSCRIBE: "기존 구독 해제 요청",
			SEND: "실시간 메시지/이벤트",
		};
		return labels[command] || `STOMP ${command}`;
	}

	function parseFrame(raw) {
		const separator = raw.indexOf("\n\n");
		const headerBlock = separator >= 0 ? raw.slice(0, separator) : raw;
		const body = separator >= 0 ? raw.slice(separator + 2) : "";
		const lines = headerBlock.split("\n").filter(Boolean);
		const command = lines.shift() || "";
		const headers = {};
		for (const line of lines) {
			const index = line.indexOf(":");
			if (index > -1) {
				headers[line.slice(0, index)] = line.slice(index + 1);
			}
		}
		let parsedBody = body;
		if (headers["content-type"] && headers["content-type"].includes("json") && body) {
			try {
				parsedBody = JSON.parse(body);
			} catch (error) {
				parsedBody = body;
			}
		}
		return { command, headers, body: parsedBody };
	}

	function handleFrame(raw) {
		if (!raw.trim()) {
			return;
		}
		const frame = parseFrame(raw);
		if (frame.command === "CONNECTED") {
			state.connected = true;
			setSocketState("연결됨", "ok");
			log("recv", "실시간 연결 완료", frame.headers);
			subscribe();
			return;
		}
		if (frame.command === "MESSAGE") {
			log("recv", `구독 채널 이벤트 수신 ${frame.headers.destination || ""}`, frame.body);
			return;
		}
		if (frame.command === "ERROR") {
			log("error", "실시간 통신 에러", frame);
			return;
		}
		log("recv", `STOMP 프레임 수신 ${frame.command}`, frame);
	}

	async function createSession() {
		const { response, body } = await requestJson("POST", "/sessions", {}, "세션 생성");
		if (!response.ok || !body?.sessionId) {
			return;
		}
		$("sessionId").value = body.sessionId;
	}

	function joinPayload() {
		const userId = $("senderId").value.trim();
		return {
			userId,
			displayName: $("displayName").value.trim(),
			clientEventId: `join-${userId}-${state.joinCounter++}-${Date.now()}`,
		};
	}

	async function joinSession() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const request = joinPayload();
		await requestJson("POST", `/sessions/${currentSessionId}/join`, request, "입장");
	}

	function connect() {
		const url = $("wsUrl").value.trim();
		state.socket = new WebSocket(url);
		setSocketState("연결 중", "");
		state.socket.onopen = () => {
			sendFrame("CONNECT", {
				"accept-version": "1.2",
				"heart-beat": "10000,10000",
			}, null, "실시간 연결 요청 전송");
		};
		state.socket.onmessage = (event) => {
			String(event.data).split("\0").forEach(handleFrame);
		};
		state.socket.onerror = () => {
			setSocketState("에러", "fail");
			log("error", "실시간 연결 에러");
		};
		state.socket.onclose = () => {
			state.connected = false;
			state.subscribed = false;
			state.subscriptionIds = [];
			setSocketState("연결 안 됨", "");
			setSubscriptionState("구독 안 됨", "");
			log("recv", "실시간 연결 종료");
		};
	}

	function disconnect() {
		if (state.socket) {
			state.socket.close();
		}
	}

	function subscribe() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		if (!state.connected) {
			log("error", "구독 전에 실시간 연결을 먼저 열어주세요");
			return;
		}
		for (const id of state.subscriptionIds) {
			sendFrame("UNSUBSCRIBE", { id });
		}
		state.subscriptionIds = [`events-${currentSessionId}`, `errors-${currentSessionId}`];
		sendFrame("SUBSCRIBE", {
			id: state.subscriptionIds[0],
			destination: `/topic/sessions/${currentSessionId}`,
		});
		sendFrame("SUBSCRIBE", {
			id: state.subscriptionIds[1],
			destination: `/topic/sessions/${currentSessionId}/errors`,
		});
		state.subscribed = true;
		setSubscriptionState("구독 중", "ok");
	}

	function buildMessagePayload() {
		const next = state.messageCounter++;
		const messageId = `msg-${next}-${Date.now()}`;
		const clientEventId = `message-${next}-${Date.now()}`;
		$("messageId").value = messageId;
		$("messageClientEventId").value = clientEventId;
		return {
			type: "MESSAGE_SENT",
			senderId: $("senderId").value.trim(),
			clientEventId,
			payload: {
				messageId: $("messageId").value.trim(),
				content: $("messageContent").value,
			},
		};
	}

	function clonePayload(payload) {
		return JSON.parse(JSON.stringify(payload));
	}

	async function appendRestMessage() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const payload = buildMessagePayload();
		state.lastRestMessagePayload = clonePayload(payload);
		await requestJson("POST", `/sessions/${currentSessionId}/events`, payload, "REST 새 메시지 전송");
	}

	async function resendRestMessage() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		if (!state.lastRestMessagePayload) {
			log("error", "먼저 REST 새 메시지를 한 번 전송하세요");
			return;
		}
		await requestJson("POST", `/sessions/${currentSessionId}/events`, clonePayload(state.lastRestMessagePayload), "REST 직전 메시지 재전송");
	}

	function sendMessage() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const payload = buildMessagePayload();
		state.lastWsMessagePayload = clonePayload(payload);
		sendFrame("SEND", {
			destination: `/app/sessions/${currentSessionId}/messages`,
			"content-type": "application/json",
		}, JSON.stringify(payload), "WebSocket 새 메시지 전송");
	}

	function resendMessage() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		if (!state.lastWsMessagePayload) {
			log("error", "먼저 WebSocket으로 새 메시지를 한 번 전송하세요");
			return;
		}
		sendFrame("SEND", {
			destination: `/app/sessions/${currentSessionId}/messages`,
			"content-type": "application/json",
		}, JSON.stringify(state.lastWsMessagePayload), "WebSocket 직전 메시지 재전송");
	}

	function sendPresence(type) {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const userId = $("senderId").value.trim();
		const suffix = type.toLowerCase().replace("_", "-");
		const payload = {
			type,
			senderId: userId,
			clientEventId: `${suffix}-${userId}-ws-${Date.now()}`,
			payload: {},
		};
		sendFrame("SEND", {
			destination: `/app/sessions/${currentSessionId}/events`,
			"content-type": "application/json",
		}, JSON.stringify(payload), `${presenceLabel(type)} 이벤트 전송`);
	}

	function presenceLabel(type) {
		return type === "DISCONNECTED" ? "끊김 처리" : "재연결 처리";
	}

	async function listEvents(afterSequence) {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const query = afterSequence ? `?afterSequence=${encodeURIComponent(afterSequence)}&limit=100` : "?limit=100";
		await requestJson("GET", `/sessions/${currentSessionId}/events${query}`, null, "이벤트 조회");
	}

	async function createSnapshot() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		await requestJson("POST", `/sessions/${currentSessionId}/snapshots`, {}, "스냅샷 생성/재호출");
	}

	async function restoreTimeline() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const at = encodeURIComponent($("timelineAt").value.trim());
		const limit = encodeURIComponent($("messageLimit").value.trim() || "100");
		await requestJson("GET", `/sessions/${currentSessionId}/timeline?at=${at}&messageLimit=${limit}`, null, "타임라인 상태 복원");
	}

	async function leaveSession() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const userId = $("senderId").value.trim();
		await requestJson("POST", `/sessions/${currentSessionId}/leave`, {
			userId,
			clientEventId: `leave-${userId}-${Date.now()}`,
		}, "퇴장");
	}

	async function endSession() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const userId = $("senderId").value.trim();
		await requestJson("POST", `/sessions/${currentSessionId}/end`, {
			endedBy: userId,
			clientEventId: `end-${currentSessionId}-001`,
		}, "세션 종료");
	}

	async function sendAfterEnd() {
		const currentSessionId = sessionId();
		if (!currentSessionId) {
			return;
		}
		const userId = $("senderId").value.trim();
		const endResult = await requestJson("POST", `/sessions/${currentSessionId}/end`, {
			endedBy: userId,
			clientEventId: `end-${currentSessionId}-reject-check`,
		}, "거절 확인용 세션 종료");
		if (!endResult.response.ok && endResult.body?.code !== "SESSION_COMPLETED") {
			log("error", "세션 종료가 확인되지 않아 메시지 거절 검증을 중단했습니다");
			return;
		}
		await requestJson("POST", `/sessions/${currentSessionId}/events`, buildRejectCheckMessagePayload(), "종료 후 메시지 거절 확인");
	}

	function buildRejectCheckMessagePayload() {
		const next = state.messageCounter++;
		const messageId = `reject-check-${next}-${Date.now()}`;
		const clientEventId = `reject-check-message-${next}-${Date.now()}`;
		return {
			type: "MESSAGE_SENT",
			senderId: $("senderId").value.trim(),
			clientEventId,
			payload: {
				messageId,
				content: "종료 후 메시지 거절 검증",
			},
		};
	}

	$("createSession").addEventListener("click", createSession);
	$("joinSession").addEventListener("click", joinSession);
	$("connect").addEventListener("click", connect);
	$("disconnect").addEventListener("click", disconnect);
	$("subscribe").addEventListener("click", subscribe);
	$("sendRestMessage").addEventListener("click", appendRestMessage);
	$("sendRestDuplicate").addEventListener("click", resendRestMessage);
	$("sendMessage").addEventListener("click", sendMessage);
	$("sendDuplicate").addEventListener("click", resendMessage);
	$("listEvents").addEventListener("click", () => listEvents(null));
	$("listEventsAfter").addEventListener("click", () => listEvents($("afterSequence").value.trim()));
	$("createSnapshot").addEventListener("click", createSnapshot);
	$("restoreTimeline").addEventListener("click", restoreTimeline);
	$("sendDisconnected").addEventListener("click", () => sendPresence("DISCONNECTED"));
	$("sendReconnected").addEventListener("click", () => sendPresence("RECONNECTED"));
	$("leaveSession").addEventListener("click", leaveSession);
	$("endSession").addEventListener("click", endSession);
	$("sendAfterEnd").addEventListener("click", sendAfterEnd);
	$("clearLog").addEventListener("click", () => $("log").replaceChildren());
	$("scrollTop").addEventListener("click", scrollToPageTop);
	$("scrollLatest").addEventListener("click", scrollToLatestLog);
</script>
</body>
</html>
