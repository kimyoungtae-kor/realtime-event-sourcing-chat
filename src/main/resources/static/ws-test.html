<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>WebSocket STOMP Test</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f6f7f9;
			--panel: #ffffff;
			--line: #d8dee8;
			--text: #1f2937;
			--muted: #667085;
			--accent: #0f766e;
			--danger: #b42318;
			--ok: #067647;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
			font-size: 14px;
			letter-spacing: 0;
		}

		main {
			width: min(1120px, calc(100vw - 32px));
			margin: 24px auto;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 24px;
			line-height: 1.25;
		}

		p {
			margin: 0;
			color: var(--muted);
			line-height: 1.5;
		}

		.layout {
			display: grid;
			grid-template-columns: 360px 1fr;
			gap: 16px;
			margin-top: 20px;
			align-items: start;
		}

		section {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 8px;
			padding: 16px;
		}

		section + section {
			margin-top: 16px;
		}

		h2 {
			margin: 0 0 12px;
			font-size: 16px;
			line-height: 1.35;
		}

		label {
			display: grid;
			gap: 6px;
			margin-bottom: 12px;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		input,
		textarea {
			width: 100%;
			border: 1px solid var(--line);
			border-radius: 6px;
			padding: 10px;
			color: var(--text);
			background: #fff;
			font: inherit;
		}

		textarea {
			min-height: 92px;
			resize: vertical;
		}

		.actions {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
			margin-top: 8px;
		}

		button {
			min-height: 38px;
			border: 1px solid var(--line);
			border-radius: 6px;
			padding: 8px 10px;
			background: #fff;
			color: var(--text);
			font: inherit;
			cursor: pointer;
		}

		button.primary {
			border-color: var(--accent);
			background: var(--accent);
			color: #fff;
		}

		button.warn {
			border-color: var(--danger);
			color: var(--danger);
		}

		button:disabled {
			cursor: not-allowed;
			opacity: 0.5;
		}

		.status-row {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			margin-top: 12px;
		}

		.badge {
			display: inline-flex;
			align-items: center;
			min-height: 28px;
			border-radius: 999px;
			padding: 4px 10px;
			background: #eef2f6;
			color: var(--muted);
			font-size: 12px;
			font-weight: 700;
		}

		.badge.ok {
			background: #ecfdf3;
			color: var(--ok);
		}

		.badge.fail {
			background: #fef3f2;
			color: var(--danger);
		}

		.log {
			height: 560px;
			overflow: auto;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: #0b1020;
			color: #e6edf7;
			padding: 12px;
			font-family: Consolas, "Courier New", monospace;
			font-size: 12px;
			line-height: 1.5;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.log-line + .log-line {
			margin-top: 8px;
		}

		.log-line .time {
			color: #98a2b3;
		}

		.log-line.send {
			color: #bae6fd;
		}

		.log-line.recv {
			color: #bbf7d0;
		}

		.log-line.error {
			color: #fecaca;
		}

		@media (max-width: 820px) {
			main {
				width: min(100vw - 20px, 720px);
				margin: 16px auto;
			}

			.layout {
				grid-template-columns: 1fr;
			}

			.log {
				height: 420px;
			}
		}
	</style>
</head>
<body>
<main>
	<h1>WebSocket STOMP 수동 검증</h1>
	<p>REST API와 같은 이벤트 저장 로직을 WebSocket에서도 사용하는지 확인하는 테스트 페이지다.</p>

	<div class="layout">
		<div>
			<section>
				<h2>Session</h2>
				<label>
					REST Base URL
					<input id="baseUrl" value="http://localhost:8080">
				</label>
				<label>
					Session ID
					<input id="sessionId" placeholder="POST /sessions 응답값">
				</label>
				<label>
					User ID
					<input id="senderId" value="user-ws">
				</label>
				<label>
					Display Name
					<input id="displayName" value="WebSocket User">
				</label>
				<div class="actions">
					<button type="button" id="createSession">세션 생성</button>
					<button type="button" id="joinSession">Join</button>
				</div>
			</section>

			<section>
				<h2>WebSocket</h2>
				<label>
					WebSocket URL
					<input id="wsUrl" value="ws://localhost:8080/ws">
				</label>
				<div class="actions">
					<button type="button" id="connect" class="primary">Connect</button>
					<button type="button" id="disconnect">Disconnect</button>
					<button type="button" id="subscribe">Subscribe</button>
					<button type="button" id="clearLog">Log Clear</button>
				</div>
				<div class="status-row">
					<span id="socketState" class="badge">DISCONNECTED</span>
					<span id="subscriptionState" class="badge">NOT SUBSCRIBED</span>
				</div>
			</section>

			<section>
				<h2>Message</h2>
				<label>
					Message ID
					<input id="messageId" value="ws-msg-001">
				</label>
				<label>
					Client Event ID
					<input id="messageClientEventId" value="ws-message-001">
				</label>
				<label>
					Content
					<textarea id="messageContent">hello over websocket</textarea>
				</label>
				<div class="actions">
					<button type="button" id="sendMessage" class="primary">Send Message</button>
					<button type="button" id="sendDuplicate">Duplicate</button>
				</div>
			</section>

			<section>
				<h2>Presence</h2>
				<div class="actions">
					<button type="button" id="sendDisconnected">DISCONNECTED</button>
					<button type="button" id="sendReconnected">RECONNECTED</button>
				</div>
			</section>
		</div>

		<section>
			<h2>Event Log</h2>
			<div id="log" class="log" aria-live="polite"></div>
		</section>
	</div>
</main>

<script>
	const state = {
		socket: null,
		connected: false,
		subscribed: false,
		subscriptionIds: [],
	};

	const $ = (id) => document.getElementById(id);

	function now() {
		return new Date().toLocaleTimeString("ko-KR", { hour12: false });
	}

	function log(type, title, data) {
		const line = document.createElement("div");
		line.className = `log-line ${type}`;
		const body = typeof data === "undefined" ? "" : `\n${typeof data === "string" ? data : JSON.stringify(data, null, 2)}`;
		line.textContent = `[${now()}] ${title}${body}`;
		$("log").appendChild(line);
		$("log").scrollTop = $("log").scrollHeight;
	}

	function setSocketState(label, kind) {
		$("socketState").textContent = label;
		$("socketState").className = `badge ${kind || ""}`.trim();
	}

	function setSubscriptionState(label, kind) {
		$("subscriptionState").textContent = label;
		$("subscriptionState").className = `badge ${kind || ""}`.trim();
	}

	function stompFrame(command, headers, body) {
		const headerLines = Object.entries(headers || {}).map(([key, value]) => `${key}:${value}`);
		return `${command}\n${headerLines.join("\n")}\n\n${body || ""}\0`;
	}

	function sendFrame(command, headers, body) {
		if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
			log("error", "WebSocket is not open");
			return;
		}
		state.socket.send(stompFrame(command, headers, body));
		log("send", `SEND FRAME ${command}`, { headers, body: body ? JSON.parse(body) : null });
	}

	function parseFrame(raw) {
		const separator = raw.indexOf("\n\n");
		const headerBlock = separator >= 0 ? raw.slice(0, separator) : raw;
		const body = separator >= 0 ? raw.slice(separator + 2) : "";
		const lines = headerBlock.split("\n").filter(Boolean);
		const command = lines.shift() || "";
		const headers = {};
		for (const line of lines) {
			const index = line.indexOf(":");
			if (index > -1) {
				headers[line.slice(0, index)] = line.slice(index + 1);
			}
		}
		let parsedBody = body;
		if (headers["content-type"] && headers["content-type"].includes("json") && body) {
			try {
				parsedBody = JSON.parse(body);
			} catch (error) {
				parsedBody = body;
			}
		}
		return { command, headers, body: parsedBody };
	}

	function handleFrame(raw) {
		if (!raw.trim()) {
			return;
		}
		const frame = parseFrame(raw);
		if (frame.command === "CONNECTED") {
			state.connected = true;
			setSocketState("CONNECTED", "ok");
			log("recv", "CONNECTED", frame.headers);
			subscribe();
			return;
		}
		if (frame.command === "MESSAGE") {
			log("recv", `MESSAGE ${frame.headers.destination || ""}`, frame.body);
			return;
		}
		if (frame.command === "ERROR") {
			log("error", "STOMP ERROR", frame);
			return;
		}
		log("recv", `RECEIVED ${frame.command}`, frame);
	}

	async function createSession() {
		const response = await fetch(`${$("baseUrl").value}/sessions`, {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: "{}",
		});
		const body = await response.json();
		if (!response.ok) {
			log("error", "POST /sessions failed", body);
			return;
		}
		$("sessionId").value = body.sessionId;
		log("recv", "POST /sessions", body);
	}

	async function joinSession() {
		const sessionId = $("sessionId").value.trim();
		const userId = $("senderId").value.trim();
		const request = {
			userId,
			displayName: $("displayName").value.trim(),
			clientEventId: `join-${userId}-ws-001`,
		};
		const response = await fetch(`${$("baseUrl").value}/sessions/${sessionId}/join`, {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify(request),
		});
		const body = await response.json();
		log(response.ok ? "recv" : "error", `POST /sessions/${sessionId}/join`, body);
	}

	function connect() {
		const url = $("wsUrl").value.trim();
		state.socket = new WebSocket(url);
		setSocketState("CONNECTING", "");
		state.socket.onopen = () => {
			sendFrame("CONNECT", {
				"accept-version": "1.2",
				"heart-beat": "10000,10000",
			});
		};
		state.socket.onmessage = (event) => {
			String(event.data).split("\0").forEach(handleFrame);
		};
		state.socket.onerror = () => {
			setSocketState("ERROR", "fail");
			log("error", "WebSocket error");
		};
		state.socket.onclose = () => {
			state.connected = false;
			state.subscribed = false;
			state.subscriptionIds = [];
			setSocketState("DISCONNECTED", "");
			setSubscriptionState("NOT SUBSCRIBED", "");
			log("recv", "WebSocket closed");
		};
	}

	function disconnect() {
		if (state.socket) {
			state.socket.close();
		}
	}

	function subscribe() {
		const sessionId = $("sessionId").value.trim();
		if (!sessionId) {
			log("error", "Session ID is required before subscribe");
			return;
		}
		if (!state.connected) {
			log("error", "Connect before subscribe");
			return;
		}
		for (const id of state.subscriptionIds) {
			sendFrame("UNSUBSCRIBE", { id });
		}
		state.subscriptionIds = [`events-${sessionId}`, `errors-${sessionId}`];
		sendFrame("SUBSCRIBE", {
			id: state.subscriptionIds[0],
			destination: `/topic/sessions/${sessionId}`,
		});
		sendFrame("SUBSCRIBE", {
			id: state.subscriptionIds[1],
			destination: `/topic/sessions/${sessionId}/errors`,
		});
		state.subscribed = true;
		setSubscriptionState("SUBSCRIBED", "ok");
	}

	function sendMessage() {
		const sessionId = $("sessionId").value.trim();
		const payload = {
			type: "MESSAGE_SENT",
			senderId: $("senderId").value.trim(),
			clientEventId: $("messageClientEventId").value.trim(),
			payload: {
				messageId: $("messageId").value.trim(),
				content: $("messageContent").value,
			},
		};
		sendFrame("SEND", {
			destination: `/app/sessions/${sessionId}/messages`,
			"content-type": "application/json",
		}, JSON.stringify(payload));
	}

	function sendPresence(type) {
		const sessionId = $("sessionId").value.trim();
		const userId = $("senderId").value.trim();
		const suffix = type.toLowerCase().replace("_", "-");
		const payload = {
			type,
			senderId: userId,
			clientEventId: `${suffix}-${userId}-ws-${Date.now()}`,
			payload: {},
		};
		sendFrame("SEND", {
			destination: `/app/sessions/${sessionId}/events`,
			"content-type": "application/json",
		}, JSON.stringify(payload));
	}

	$("createSession").addEventListener("click", createSession);
	$("joinSession").addEventListener("click", joinSession);
	$("connect").addEventListener("click", connect);
	$("disconnect").addEventListener("click", disconnect);
	$("subscribe").addEventListener("click", subscribe);
	$("sendMessage").addEventListener("click", sendMessage);
	$("sendDuplicate").addEventListener("click", sendMessage);
	$("sendDisconnected").addEventListener("click", () => sendPresence("DISCONNECTED"));
	$("sendReconnected").addEventListener("click", () => sendPresence("RECONNECTED"));
	$("clearLog").addEventListener("click", () => $("log").replaceChildren());
</script>
</body>
</html>
